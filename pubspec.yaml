name: project_temp
description: "Clean Architecture — API и локальное хранилище."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  equatable: ^2.0.7
  flutter_secure_storage: ^9.2.4
  fpdart: ^1.1.1
  get_it: ^8.0.3
  flutter_bloc: ^8.1.6
  logger: ^2.5.0
  shared_preferences: ^2.3.5
  json_annotation: ^4.11.0
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  cross_file: ^0.3.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
